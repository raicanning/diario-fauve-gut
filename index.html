<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FAUVE clinic — Diário Alimentar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#77786a;--primary-light:#8a8b7d;--primary-dark:#5f6054;
  --accent:#a8a18a;--accent-light:#c4bfa8;
  --bg:#FAFAF7;--bg-card:#FFFFFF;--bg-warm:#F5F3EF;
  --text:#3a3a38;--text-light:#6B6B6B;--text-muted:#9A9A9A;--border:#E4E2DC;
  --success:#8a9a7a;--warning:#b8a06a;--danger:#b07060;
  --shadow-sm:0 1px 3px rgba(119,120,106,.05);--shadow-md:0 4px 14px rgba(119,120,106,.08);--shadow-lg:0 8px 30px rgba(119,120,106,.10);
  --radius:18px;--radius-sm:12px;--radius-xs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes checkmark{0%{stroke-dashoffset:24}100%{stroke-dashoffset:0}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes floatIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.app-container{max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}

/* HEADER */
.header{background:var(--bg);padding:30px 24px 20px;text-align:center;position:relative;border-bottom:1px solid var(--border)}
.logo-container{margin-bottom:16px}
.logo-container img{width:200px;height:auto;display:block;margin:0 auto}
.welcome-text{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--primary);margin-bottom:14px;font-weight:500}
.patient-name-bar{background:var(--primary);color:white;padding:12px 20px;border-radius:var(--radius-sm);margin:0 0 0;display:flex;align-items:center;justify-content:center;gap:8px}
.patient-name-bar h2{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;letter-spacing:.5px}
.header-date{position:absolute;top:14px;right:18px;font-size:10px;color:var(--text-muted);background:var(--bg-warm);padding:4px 10px;border-radius:20px}
.nutri-access-btn{position:absolute;top:14px;left:18px;width:26px;height:26px;border-radius:50%;background:var(--bg-warm);border:none;cursor:pointer;opacity:.35;transition:opacity .3s;font-size:10px;color:var(--text-muted);display:flex;align-items:center;justify-content:center}
.nutri-access-btn:hover{opacity:.7}

/* PROGRESS */
.progress-section{padding:16px 24px 0;animation:fadeUp .5s ease .1s both}
.progress-card{background:var(--bg-card);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-md);border:1px solid var(--border)}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-label{font-size:12px;font-weight:600;color:var(--text-light)}
.progress-count{font-size:11px;color:var(--primary);font-weight:600;background:rgba(119,120,106,.07);padding:3px 10px;border-radius:20px}
.progress-bar{height:5px;background:#EEECE7;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary-dark),var(--primary-light));border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);position:relative}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);background-size:200% 100%;animation:shimmer 2.5s infinite}

/* MEALS */
.meals-section{padding:18px 24px 40px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;letter-spacing:.3px;color:var(--text-light)}
.meal-card{background:var(--bg-card);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);overflow:hidden;transition:all .3s;cursor:pointer}
.meal-card:hover{box-shadow:var(--shadow-md);border-color:rgba(119,120,106,.2);transform:translateY(-1px)}
.meal-card.completed{border-color:rgba(138,154,122,.3)}
.meal-card.completed .meal-card-header{background:rgba(138,154,122,.04)}
.meal-card-header{display:flex;align-items:center;padding:13px 16px;gap:12px}
.meal-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.meal-icon.cafe{background:#FAF5EE}.meal-icon.lanche-m{background:#F0F3ED}
.meal-icon.almoco{background:#FBF7F0}.meal-icon.lanche-t{background:#F5F0F0}
.meal-icon.jantar{background:#EEEFF5}.meal-icon.ceia{background:#F2F0F5}
.meal-info{flex:1}.meal-name{font-size:14px;font-weight:600}
.meal-status{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.meal-card.completed .meal-status{background:var(--success);border-color:var(--success)}
.meal-status svg{width:12px;height:12px;stroke:white;stroke-width:3;fill:none;stroke-dasharray:24;stroke-dashoffset:24}
.meal-card.completed .meal-status svg{animation:checkmark .4s ease .1s forwards}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.active{display:flex;animation:fadeIn .2s ease}
.modal{background:var(--bg);width:100%;max-width:480px;max-height:92vh;border-radius:24px 24px 0 0;overflow-y:auto;animation:slideUp .4s cubic-bezier(.16,1,.3,1);overscroll-behavior:contain}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-header{padding:18px 24px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;display:flex;align-items:center;gap:10px}
.modal-close{width:30px;height:30px;border-radius:50%;border:none;background:#EEECE7;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-light)}
.modal-close:hover{background:#E4E2DC}
.modal-body{padding:0 24px 32px}

/* FORM */
.form-group{margin-bottom:20px;animation:floatIn .4s ease both}
.form-label{font-size:13px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.form-sublabel{font-size:11px;color:var(--text-muted);font-weight:400;margin-top:2px}
.toggle-group{display:flex;gap:7px;flex-wrap:wrap}
.toggle-btn{padding:9px 14px;border-radius:25px;border:1.5px solid var(--border);background:var(--bg-card);font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;user-select:none;-webkit-tap-highlight-color:transparent}
.toggle-btn:hover{border-color:var(--primary-light)}
.toggle-btn.active{background:var(--primary);color:white;border-color:var(--primary);box-shadow:0 2px 8px rgba(119,120,106,.2)}
.toggle-btn.active-warning{background:var(--warning);color:white;border-color:var(--warning)}
.toggle-btn.active-danger{background:var(--danger);color:white;border-color:var(--danger)}
.chip-group{display:flex;gap:6px;flex-wrap:wrap}
.chip-btn{padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg-card);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text-light);cursor:pointer;transition:all .2s;user-select:none;-webkit-tap-highlight-color:transparent}
.chip-btn:hover{border-color:var(--accent)}.chip-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
.emoji-rating{display:flex;gap:5px}
.emoji-btn{width:48px;height:48px;border-radius:14px;border:2px solid var(--border);background:var(--bg-card);font-size:21px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;position:relative;-webkit-tap-highlight-color:transparent}
.emoji-btn:hover{transform:scale(1.06);border-color:var(--primary-light)}
.emoji-btn.active{border-color:var(--primary);background:rgba(119,120,106,.07);transform:scale(1.08);box-shadow:0 2px 10px rgba(119,120,106,.12)}
.emoji-label{position:absolute;bottom:-16px;font-size:9px;color:var(--text-muted);white-space:nowrap}
.form-textarea{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg-card);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);resize:none;transition:border-color .2s;min-height:60px}
.form-textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(119,120,106,.06)}
.form-textarea::placeholder{color:var(--text-muted)}
.bristol-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.bristol-btn{aspect-ratio:1;border-radius:10px;border:2px solid var(--border);background:var(--bg-card);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text-light);transition:all .2s;padding:2px;-webkit-tap-highlight-color:transparent}
.bristol-btn .num{font-size:14px;font-weight:700;margin-bottom:1px}
.bristol-btn:hover{border-color:var(--primary-light)}
.bristol-btn.active{border-color:var(--primary);background:rgba(119,120,106,.07);color:var(--primary)}

/* WATER - NEW DESIGN */
.water-tracker{display:flex;flex-direction:column;gap:8px}
.water-row{display:flex;gap:5px;flex-wrap:wrap}
.water-drop{width:44px;height:52px;border-radius:8px 8px 14px 14px;border:2px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;gap:1px}
.water-drop.filled{background:linear-gradient(180deg,#E8EDE3,#D0D8C8);border-color:var(--success)}
.water-drop .drop-icon{font-size:14px;line-height:1}
.water-drop .drop-ml{font-size:8px;font-weight:700;color:var(--text-muted)}
.water-drop.filled .drop-ml{color:var(--primary-dark)}
.water-total{font-size:13px;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:4px}

.submit-btn{width:100%;padding:14px;border-radius:14px;border:none;background:var(--primary);color:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;-webkit-tap-highlight-color:transparent}
.submit-btn:hover{box-shadow:0 4px 16px rgba(119,120,106,.25);transform:translateY(-1px)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.submit-btn .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:none}

/* SUCCESS */
.success-overlay{position:fixed;inset:0;background:rgba(119,120,106,.94);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;color:white;text-align:center;padding:40px;backdrop-filter:blur(10px)}
.success-overlay.active{display:flex}
.success-icon{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:18px;animation:pulse .6s ease}
.success-overlay h3{font-family:'Cormorant Garamond',serif;font-size:22px;margin-bottom:6px;letter-spacing:.5px}
.success-overlay p{opacity:.8;font-size:13px;line-height:1.5}

/* PASSWORD */
.password-modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(6px)}
.password-modal.active{display:flex}
.password-box{background:var(--bg-card);border-radius:var(--radius);padding:26px 22px;max-width:320px;width:100%;box-shadow:var(--shadow-lg);animation:scaleIn .3s ease;text-align:center}
.password-box h3{font-family:'Cormorant Garamond',serif;font-size:17px;margin-bottom:5px}
.password-box p{font-size:12px;color:var(--text-muted);margin-bottom:16px}
.password-input{width:100%;padding:11px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;text-align:center;letter-spacing:4px;margin-bottom:12px}
.password-input:focus{outline:none;border-color:var(--primary)}
.password-input.error{border-color:var(--danger);animation:shake .4s ease}
.password-actions{display:flex;gap:10px}
.password-actions button{flex:1;padding:10px;border-radius:var(--radius-sm);border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-cancel{background:#EEECE7;color:var(--text-light)}.btn-enter{background:var(--primary);color:white}

/* NUTRI */
.nutri-panel{display:none;min-height:100vh}.nutri-panel.active{display:block}
.nutri-header{background:var(--primary);padding:22px;color:white;display:flex;align-items:center;justify-content:space-between}
.nutri-header-left h1{font-family:'Cormorant Garamond',serif;font-size:19px;margin-bottom:3px;letter-spacing:.5px}
.nutri-header-left p{font-size:12px;opacity:.7}
.nutri-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nutri-content{padding:18px 22px 40px}
.setup-card{background:var(--bg-warm);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;animation:fadeUp .4s ease both}
.setup-card h3{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.setup-card p{font-size:11.5px;color:var(--text-light);line-height:1.5;margin-bottom:8px}
.setup-card ol{font-size:11px;color:var(--text-light);line-height:1.7;padding-left:16px;margin-bottom:12px}
.setup-card.connected{border-color:var(--success);background:#f0f3ed}
.setup-input-group{display:flex;gap:8px;margin-bottom:6px}
.setup-input{flex:1;padding:9px 11px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:12px}
.setup-input:focus{outline:none;border-color:var(--primary)}
.setup-save-btn{padding:9px 16px;border-radius:var(--radius-sm);border:none;background:var(--primary);color:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.setup-status{font-size:11px;margin-top:5px;font-weight:600}
.setup-status.ok{color:var(--success)}.setup-status.err{color:var(--danger)}
.link-generator{background:var(--bg-card);border-radius:var(--radius);padding:18px;border:1px solid var(--border);margin-bottom:14px}
.link-generator h3{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.form-input{width:100%;padding:10px 13px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);margin-bottom:9px}
.form-input:focus{outline:none;border-color:var(--primary)}
.generate-btn{width:100%;padding:11px;border-radius:var(--radius-sm);border:none;background:var(--primary);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.generated-link{margin-top:12px;padding:10px;background:var(--bg-warm);border-radius:var(--radius-xs);font-size:10px;word-break:break-all;color:var(--primary);display:none;align-items:center;gap:8px}
.generated-link.visible{display:flex}
.copy-btn{flex-shrink:0;padding:5px 11px;border-radius:6px;border:none;background:var(--primary);color:white;font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.empty-state{text-align:center;padding:24px 16px;color:var(--text-muted)}.empty-state p{font-size:12px}
.conditional-section{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease;opacity:0;margin-top:0}
.conditional-section.visible{max-height:500px;opacity:1;margin-top:12px}
@media(min-width:481px){.app-container{border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 40px rgba(0,0,0,.04)}}
</style>
</head>

<script>
var NUTRI_PASSWORD='fauve2026';
var MEALS=[{id:'cafe',name:'Café da Manhã',icon:'☀️',iconClass:'cafe'},{id:'lanche_m',name:'Lanche da Manhã',icon:'🍎',iconClass:'lanche-m'},{id:'almoco',name:'Almoço',icon:'🍲',iconClass:'almoco'},{id:'lanche_t',name:'Lanche da Tarde',icon:'🫐',iconClass:'lanche-t'},{id:'jantar',name:'Jantar',icon:'🌙',iconClass:'jantar'},{id:'ceia',name:'Ceia',icon:'🌜',iconClass:'ceia'}];
var DIFFICULTIES=['Muita fome','Ansiedade','Falta de tempo','Sem opções saudáveis','Não gostei da comida','Evento social','Outro'];
var SYMPTOMS=['🌀 Inchaço','💨 Gases','🔥 Azia','😣 Cólica','🚽 Diarreia','🧱 Constipação','😴 Sonolência','🤢 Náusea','✅ Nenhum'];
var FEELINGS=[{emoji:'😫',label:'Muito mal'},{emoji:'😕',label:'Mal'},{emoji:'😐',label:'Normal'},{emoji:'🙂',label:'Bem'},{emoji:'😄',label:'Ótimo'}];
var WATER_ML=100;
var state={patientName:'',patientId:'',meals:{},water:0,currentMeal:null,currentFormData:{}};
var DB_KEY='fauvegut_data',SHEET_URL_KEY='fauvegut_sheet_url';
function getTodayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function loadState(){try{var s=JSON.parse(localStorage.getItem(DB_KEY)||'{}');if(s.date===getTodayKey()){state.meals=s.meals||{};state.water=s.water||0}}catch(e){}}
function saveState(){try{localStorage.setItem(DB_KEY,JSON.stringify({date:getTodayKey(),meals:state.meals,water:state.water,patientName:state.patientName,patientId:state.patientId}))}catch(e){}}
function getSheetUrl(){return localStorage.getItem(SHEET_URL_KEY)||''}
function setSheetUrl(u){localStorage.setItem(SHEET_URL_KEY,u)}
async function sendToSheets(d){var u=getSheetUrl();if(!u)return;var n=new Date();try{await fetch(u,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:n.toLocaleDateString('pt-BR'),time:n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),patientName:state.patientName||'Não informado',patientId:state.patientId||'-',mealName:MEALS.find(function(m){return m.id===state.currentMeal}).name,diet:d.diet==='sim'?'Sim':d.diet==='parcial'?'Parcialmente':d.diet==='nao'?'Não seguiu':'Pulou',difficulties:(d.difficulties||[]).join(', ')||'-',whatAte:d.whatAte||'-',feeling:d.feeling!=null?FEELINGS[d.feeling].emoji+' '+FEELINGS[d.feeling].label:'-',symptoms:(d.symptoms||[]).join(', ')||'-',bristol:d.bristol?'Tipo '+d.bristol:'-',water:(d.water*WATER_ML)+'ml',notes:d.notes||'-'})})}catch(e){}}
var APPS_SCRIPT_CODE='function doPost(e) {\n  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();\n  var data = JSON.parse(e.postData.contents);\n  if (sheet.getLastRow() === 0) {\n    sheet.appendRow(["Data","Horário","Paciente","ID","Refeição","Seguiu Dieta","Dificuldades","O que comeu","Sentimento","Sintomas","Bristol","Água","Observações"]);\n    sheet.getRange(1,1,1,13).setFontWeight("bold");\n  }\n  sheet.appendRow([data.date,data.time,data.patientName,data.patientId,data.mealName,data.diet,data.difficulties,data.whatAte,data.feeling,data.symptoms,data.bristol,data.water,data.notes]);\n  return ContentService.createTextOutput(JSON.stringify({status:"ok"})).setMimeType(ContentService.MimeType.JSON);\n}\nfunction doGet(e) {\n  return ContentService.createTextOutput(JSON.stringify({status:"ok"})).setMimeType(ContentService.MimeType.JSON);\n}';
function parseParams(){var p=new URLSearchParams(window.location.search);state.patientName=p.get('nome')||'';state.patientId=p.get('id')||'';if(state.patientName){document.getElementById('greetingText').textContent='Olá, '+state.patientName.split(' ')[0]+'! 👋';document.getElementById('patientBar').style.display='flex'}}
function setDate(){document.getElementById('currentDate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'})}
function renderMealCards(){document.getElementById('mealCards').innerHTML=MEALS.map(function(m,i){return'<div class="meal-card '+(state.meals[m.id]?'completed':'')+'" onclick="openMealForm(\''+m.id+'\')" style="animation:fadeUp .4s ease '+(.06+i*.04)+'s both"><div class="meal-card-header"><div class="meal-icon '+m.iconClass+'">'+m.icon+'</div><div class="meal-info"><div class="meal-name">'+m.name+'</div></div><div class="meal-status"><svg viewBox="0 0 16 16"><polyline points="3.5 8.5 6.5 11.5 12.5 5.5"/></svg></div></div></div>'}).join('')}
function updateProgress(){var d=Object.keys(state.meals).length;document.getElementById('progressFill').style.width=Math.round((d/MEALS.length)*100)+'%';document.getElementById('progressCount').textContent=d+' de '+MEALS.length}
function openMealForm(id){
  var meal=MEALS.find(function(m){return m.id===id});state.currentMeal=id;
  state.currentFormData={diet:null,difficulties:[],feeling:null,symptoms:[],bristol:null};
  document.getElementById('modalTitle').innerHTML=meal.icon+' '+meal.name;
  var waterHtml='';for(var i=0;i<10;i++){waterHtml+='<div class="water-drop '+(i<state.water?'filled':'')+'" onclick="setWater('+(i+1)+')"><span class="drop-icon">'+(i<state.water?'💧':'○')+'</span><span class="drop-ml">'+WATER_ML+'ml</span></div>'}
  document.getElementById('modalBody').innerHTML=
    '<div class="form-group" style="animation-delay:.05s"><div class="form-label">📋 Seguiu o plano alimentar?</div><div class="toggle-group"><button class="toggle-btn" onclick="selectDiet(this,\'sim\')">✅ Sim</button><button class="toggle-btn" onclick="selectDiet(this,\'parcial\')">🔶 Parcialmente</button><button class="toggle-btn" onclick="selectDiet(this,\'nao\')">❌ Não</button><button class="toggle-btn" onclick="selectDiet(this,\'pulou\')">⏭️ Pulei</button></div><div class="conditional-section" id="difficultySection"><div class="form-label" style="margin-top:4px">🤔 Qual dificuldade?</div><div class="chip-group">'+DIFFICULTIES.map(function(d){return'<button class="chip-btn" onclick="toggleChip(this,\'difficulties\')">'+d+'</button>'}).join('')+'</div></div></div>'+
    '<div class="form-group" style="animation-delay:.1s" id="whatAteSection"><div class="form-label">🍽️ O que comeu?</div><textarea class="form-textarea" id="whatAte" placeholder="Ex: Omelete com legumes, pão integral..." rows="2"></textarea></div>'+
    '<div class="form-group" style="animation-delay:.18s"><div class="form-label">💭 Como se sentiu após?</div><div class="emoji-rating">'+FEELINGS.map(function(f,i){return'<button class="emoji-btn" onclick="selectFeeling(this,'+i+')">'+f.emoji+'<span class="emoji-label">'+f.label+'</span></button>'}).join('')+'</div></div>'+
    '<div class="form-group" style="animation-delay:.24s"><div class="form-label">🫁 Sintomas intestinais?</div><div class="chip-group">'+SYMPTOMS.map(function(s){return'<button class="chip-btn" onclick="toggleChip(this,\'symptoms\')">'+s+'</button>'}).join('')+'</div></div>'+
    (['almoco','jantar','ceia'].indexOf(id)>=0?'<div class="form-group" style="animation-delay:.3s"><div class="form-label">📊 Escala de Bristol</div><div class="form-sublabel">Tipos 3 e 4 são ideais</div><div class="bristol-grid">'+[1,2,3,4,5,6,7].map(function(n){return'<button class="bristol-btn" onclick="selectBristol(this,'+n+')"><span class="num">'+n+'</span><span>'+['','Caroço','Salsi.','Rachad.','Liso','Pedaç.','Pastoso','Líquid.'][n]+'</span></button>'}).join('')+'</div></div>':'')+
    '<div class="form-group" style="animation-delay:.35s"><div class="form-label">💧 Água consumida hoje</div><div class="water-tracker"><div class="water-row">'+waterHtml+'</div><div class="water-total" id="waterTotal">💧 Total: <strong>'+(state.water*WATER_ML)+'ml</strong></div></div></div>'+
    '<div class="form-group" style="animation-delay:.4s"><div class="form-label">📝 Observações <span style="font-weight:400;color:var(--text-muted)">(opcional)</span></div><textarea class="form-textarea" id="notes" placeholder="Algo mais que queira registrar..." rows="2"></textarea></div>'+
    '<button class="submit-btn" id="submitBtn" onclick="submitMeal()"><span class="spinner" id="submitSpinner"></span><span id="submitText">Salvar registro ✓</span></button>';
  document.getElementById('mealModal').classList.add('active');document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('mealModal').classList.remove('active');document.body.style.overflow=''}
function selectDiet(btn,v){btn.parentElement.querySelectorAll('.toggle-btn').forEach(function(b){b.classList.remove('active','active-warning','active-danger')});var d=document.getElementById('difficultySection'),e=document.getElementById('whatAteSection');if(v==='sim'){btn.classList.add('active');d.classList.remove('visible');e.style.display=''}else if(v==='parcial'){btn.classList.add('active-warning');d.classList.add('visible');e.style.display=''}else if(v==='nao'){btn.classList.add('active-danger');d.classList.add('visible');e.style.display=''}else{btn.classList.add('active-danger');d.classList.remove('visible');e.style.display='none'}state.currentFormData.diet=v}
function toggleChip(btn,g){btn.classList.toggle('active');state.currentFormData[g]=Array.from(btn.parentElement.querySelectorAll('.chip-btn.active')).map(function(c){return c.textContent.trim()})}
function selectFeeling(btn,i){btn.parentElement.querySelectorAll('.emoji-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');state.currentFormData.feeling=i}
function selectBristol(btn,n){btn.parentElement.querySelectorAll('.bristol-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');state.currentFormData.bristol=n}
function setWater(n){state.water=(state.water===n)?n-1:n;document.querySelectorAll('.water-drop').forEach(function(g,i){if(i<state.water){g.classList.add('filled');g.querySelector('.drop-icon').textContent='💧'}else{g.classList.remove('filled');g.querySelector('.drop-icon').textContent='○'}});document.getElementById('waterTotal').innerHTML='💧 Total: <strong>'+(state.water*WATER_ML)+'ml</strong>';saveState()}
async function submitMeal(){
  var btn=document.getElementById('submitBtn'),sp=document.getElementById('submitSpinner'),tx=document.getElementById('submitText');
  btn.disabled=true;sp.style.display='block';tx.textContent='Enviando...';
  var data=Object.assign({},state.currentFormData,{whatAte:(document.getElementById('whatAte')||{}).value||'',notes:(document.getElementById('notes')||{}).value||'',water:state.water});
  if(getSheetUrl())await sendToSheets(data);
  state.meals[state.currentMeal]=data;saveState();closeModal();
  var o=document.getElementById('successOverlay'),m=document.getElementById('successMsg');
  m.innerHTML=getSheetUrl()?'Registrado e enviado para a<br>equipe do <strong>FAUVE GUT</strong>! 📊':'Refeição salva com sucesso!';
  o.classList.add('active');setTimeout(function(){o.classList.remove('active')},2200);
  renderMealCards();updateProgress();btn.disabled=false;sp.style.display='none';tx.textContent='Salvar registro ✓';
}
function showPasswordModal(){document.getElementById('passwordModal').classList.add('active');document.getElementById('passwordInput').value='';document.getElementById('passwordInput').focus()}
function closePasswordModal(){document.getElementById('passwordModal').classList.remove('active')}
function checkPassword(){var i=document.getElementById('passwordInput');if(i.value===NUTRI_PASSWORD){closePasswordModal();enterNutri()}else{i.classList.add('error');setTimeout(function(){i.classList.remove('error')},500);i.value=''}}
function enterNutri(){document.getElementById('patientView').style.display='none';document.getElementById('nutriPanel').classList.add('active');renderNutriPanel()}
function exitNutri(){document.getElementById('nutriPanel').classList.remove('active');document.getElementById('patientView').style.display=''}
function renderNutriPanel(){
  var sheetUrl=getSheetUrl(),ok=!!sheetUrl,h='';
  // STEP 1 - SHEETS
  h+='<div class="setup-card '+(ok?'connected':'')+'" style="animation-delay:0s">';
  h+='<h3>📊 Passo 1 — Conectar Google Sheets</h3>';
  if(ok){h+='<p style="color:var(--success);font-weight:600">✅ Planilha conectada!</p><p style="font-size:10px;color:var(--text-muted);word-break:break-all">'+sheetUrl.substring(0,55)+'...</p><button onclick="setSheetUrl(\'\');renderNutriPanel()" style="margin-top:8px;padding:7px 12px;border-radius:8px;border:1.5px solid var(--danger);background:transparent;color:var(--danger);font-family:DM Sans;font-size:11px;font-weight:600;cursor:pointer">Desconectar</button>'
  }else{
    h+='<p>Configure para receber os dados na sua planilha (gratuito!).</p><ol>';
    h+='<li>Crie uma planilha no <a href="https://sheets.google.com" target="_blank" style="color:var(--primary)">Google Sheets</a></li>';
    h+='<li>Menu <strong>Extensões → Apps Script</strong></li>';
    h+='<li>Apague tudo e cole o código abaixo</li>';
    h+='<li><strong>Implantar → Nova implantação → App da Web</strong></li>';
    h+='<li>Acesso: <strong>"Qualquer pessoa"</strong></li>';
    h+='<li>Copie a URL e cole aqui</li></ol>';
    h+='<details style="margin-bottom:12px"><summary style="cursor:pointer;font-size:11px;font-weight:600;color:var(--primary)">📋 Ver código</summary>';
    h+='<div style="margin-top:6px;position:relative"><pre id="appsScriptCode" style="background:#3a3a38;color:#c4bfa8;padding:12px;border-radius:10px;font-size:9.5px;overflow-x:auto;line-height:1.5;white-space:pre-wrap">'+APPS_SCRIPT_CODE.replace(/\\n/g,'\n')+'</pre>';
    h+='<button onclick="navigator.clipboard.writeText(document.getElementById(\'appsScriptCode\').textContent).then(function(){event.target.textContent=\'Copiado!\';setTimeout(function(){event.target.textContent=\'Copiar\'},2000)})" style="position:absolute;top:6px;right:6px;padding:3px 8px;border-radius:5px;border:none;background:rgba(255,255,255,.12);color:white;font-size:9px;cursor:pointer;font-family:DM Sans">Copiar</button></div></details>';
    h+='<div class="setup-input-group"><input class="setup-input" id="sheetsUrl" placeholder="Cole a URL do Apps Script..."><button class="setup-save-btn" onclick="saveSheetUrlAndRefresh()">Salvar</button></div><div class="setup-status" id="setupStatus"></div>';
  }
  h+='</div>';
  // STEP 2 - LINKS
  h+='<div class="setup-card" style="animation-delay:.1s"><h3>🔗 Passo 2 — Gerar Link do Paciente</h3>';
  h+='<p>Cada paciente recebe um link personalizado com o nome já preenchido.</p>';
  h+='<input class="form-input" id="linkName" placeholder="Nome completo do paciente">';
  h+='<input class="form-input" id="linkId" placeholder="ID / Código (opcional)">';
  h+='<button class="generate-btn" onclick="generateLink()">Gerar Link</button>';
  h+='<div class="generated-link" id="generatedLink"><span id="linkText"></span><button class="copy-btn" onclick="copyLink()">Copiar</button></div></div>';
  // STEP 3 - GITHUB
  h+='<div class="setup-card" style="animation-delay:.2s"><h3>🌐 Passo 3 — Hospedar no GitHub (grátis)</h3>';
  h+='<ol><li>Acesse <a href="https://github.com" target="_blank" style="color:var(--primary)">github.com</a> e crie uma conta</li>';
  h+='<li>Clique em <strong>"New repository"</strong></li>';
  h+='<li>Nome: <strong>diario-alimentar</strong> • Público ✓</li>';
  h+='<li>Clique <strong>"Add file → Upload files"</strong></li>';
  h+='<li>Renomeie o arquivo para <strong>index.html</strong> e envie</li>';
  h+='<li>Vá em <strong>Settings → Pages</strong></li>';
  h+='<li>Em "Branch" selecione <strong>main</strong> e clique Save</li>';
  h+='<li>Seu site ficará em:<br><strong style="color:var(--primary)">https://seuusuario.github.io/diario-alimentar</strong></li></ol></div>';
  // STEP 4 - SEND
  h+='<div class="setup-card" style="animation-delay:.3s"><h3>📱 Passo 4 — Enviar para o Paciente</h3>';
  h+='<p>Copie o link gerado no Passo 2 e envie por WhatsApp. Exemplo:</p>';
  h+='<div style="background:#DCF8C6;padding:12px 14px;border-radius:0 14px 14px 14px;font-size:12px;line-height:1.5;margin-top:8px;color:#303030">';
  h+='Olá! 🌿 Segue o link do seu <strong>Diário Alimentar FAUVE</strong>:<br><br>';
  h+='<span style="color:#0066cc">https://seusite.github.io/diario-alimentar?nome=Maria+Silva</span><br><br>';
  h+='Preencha suas refeições diariamente! 💚</div></div>';
  // SAVED LINKS
  h+='<div class="link-generator" style="animation:fadeUp .4s ease .4s both"><h3>📋 Links Gerados</h3><div>'+renderSavedLinks()+'</div></div>';
  document.getElementById('nutriContent').innerHTML=h;
}
function saveSheetUrlAndRefresh(){var u=document.getElementById('sheetsUrl').value.trim();if(!u){document.getElementById('setupStatus').textContent='Cole a URL';document.getElementById('setupStatus').className='setup-status err';return}setSheetUrl(u);renderNutriPanel()}
function generateLink(){var n=document.getElementById('linkName').value.trim();if(!n){document.getElementById('linkName').style.borderColor='var(--danger)';setTimeout(function(){document.getElementById('linkName').style.borderColor=''},1500);return}var id=document.getElementById('linkId').value.trim(),base=window.location.origin+window.location.pathname,p=new URLSearchParams();p.set('nome',n);if(id)p.set('id',id);var link=base+'?'+p.toString();document.getElementById('linkText').textContent=link;document.getElementById('generatedLink').classList.add('visible');var s=JSON.parse(localStorage.getItem('fauvegut_links')||'[]');s.push({name:n,id:id,link:link,created:new Date().toISOString()});localStorage.setItem('fauvegut_links',JSON.stringify(s))}
function copyLink(){navigator.clipboard.writeText(document.getElementById('linkText').textContent).then(function(){var b=document.querySelector('#generatedLink .copy-btn');b.textContent='Copiado!';setTimeout(function(){b.textContent='Copiar'},2000)})}
function renderSavedLinks(){var s=JSON.parse(localStorage.getItem('fauvegut_links')||'[]');if(!s.length)return'<div class="empty-state"><p>Nenhum link gerado ainda</p></div>';return s.map(function(x){return'<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;font-weight:600">👤 '+x.name+'</div><div style="font-size:10px;color:var(--text-muted)">'+(x.id?'ID: '+x.id+' · ':'')+new Date(x.created).toLocaleDateString('pt-BR')+'</div></div><button class="copy-btn" onclick="navigator.clipboard.writeText(\''+x.link+'\');this.textContent=\'✓\';setTimeout(function(){},1500)">Copiar</button></div>'}).join('')}
parseParams();loadState();setDate();renderMealCards();updateProgress();
</script>
